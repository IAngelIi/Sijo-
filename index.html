<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>QR</title>
  <style>
    :root {
      --bg-1: #050505;
      --bg-2: #090909;
      --line: rgba(255,255,255,.11);
      --glass: rgba(255,255,255,.06);
      --glass-2: rgba(255,255,255,.09);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.55);
      --accent-a: #7c3aed;
      --accent-b: #22d3ee;
      --accent-c: #fb7185;
      --shadow: 0 24px 80px rgba(0,0,0,.62);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(124,58,237,.18), transparent 26%),
        radial-gradient(circle at 85% 10%, rgba(34,211,238,.14), transparent 22%),
        radial-gradient(circle at 50% 85%, rgba(251,113,133,.10), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 0%, black 42%, transparent 100%);
      opacity: .34;
      z-index: -2;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .06;
      mix-blend-mode: soft-light;
      z-index: 999;
      background-image:
        linear-gradient(transparent 0 49%, rgba(255,255,255,.22) 50%, transparent 51%),
        linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,.16) 50%, transparent 51%);
      background-size: 4px 4px, 5px 5px;
    }

    .glow {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 560px;
      height: 560px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(124,58,237,.20), rgba(34,211,238,.12) 34%, transparent 70%);
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
      opacity: .85;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .72; }
      50% { transform: translate(-50%, -50%) scale(1.07); opacity: .92; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(18px);
      z-index: 0;
      opacity: .7;
      animation: float 8s ease-in-out infinite;
    }

    .orb.one {
      width: 140px;
      height: 140px;
      left: 12%;
      top: 20%;
      background: rgba(124,58,237,.15);
      box-shadow: 0 0 80px rgba(124,58,237,.18);
    }

    .orb.two {
      width: 180px;
      height: 180px;
      right: 10%;
      top: 18%;
      background: rgba(34,211,238,.12);
      box-shadow: 0 0 90px rgba(34,211,238,.16);
      animation-delay: -2s;
    }

    .orb.three {
      width: 220px;
      height: 220px;
      left: 55%;
      bottom: 6%;
      background: rgba(251,113,133,.08);
      box-shadow: 0 0 100px rgba(251,113,133,.12);
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px) scale(1); }
      50% { transform: translateY(-16px) translateX(8px) scale(1.05); }
    }

    .frame {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      aspect-ratio: 1 / 1;
      padding: 18px;
      border-radius: calc(var(--radius) + 8px);
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.04)),
        rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.13);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255,255,255,.20);
      backdrop-filter: blur(20px);
      overflow: hidden;
      transform: translateZ(0);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, rgba(124,58,237,.7), rgba(34,211,238,.55), rgba(251,113,133,.45));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: .45;
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.18), transparent 18%),
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.10), transparent 14%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.08), transparent 16%);
      opacity: .8;
    }

    .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: calc(var(--radius) - 8px);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.08), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .scanline {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 10px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(34,211,238,.95), rgba(124,58,237,.95), transparent);
      box-shadow: 0 0 18px rgba(34,211,238,.50);
      animation: scan 3s ease-in-out infinite;
      z-index: 2;
      opacity: .85;
    }

    @keyframes scan {
      0%   { transform: translateY(0); opacity: .20; }
      15%  { opacity: .92; }
      50%  { transform: translateY(calc(100% + 240px)); opacity: .88; }
      85%  { opacity: .92; }
      100% { transform: translateY(0); opacity: .20; }
    }

    .qr-link {
      position: relative;
      z-index: 1;
      display: block;
      width: min(100%, 320px);
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      overflow: hidden;
      text-decoration: none;
      cursor: default;
      transform: translateZ(0);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .qr-link:hover {
      transform: scale(1.01);
      filter: brightness(1.03);
    }

    .qr-link img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #fff;
      border-radius: 22px;
    }

    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,.18);
      pointer-events: none;
      z-index: 2;
    }

    .corner.tl {
      top: 14px;
      left: 14px;
      border-right: 0;
      border-bottom: 0;
      border-top-left-radius: 8px;
    }

    .corner.tr {
      top: 14px;
      right: 14px;
      border-left: 0;
      border-bottom: 0;
      border-top-right-radius: 8px;
    }

    .corner.bl {
      bottom: 14px;
      left: 14px;
      border-right: 0;
      border-top: 0;
      border-bottom-left-radius: 8px;
    }

    .corner.br {
      bottom: 14px;
      right: 14px;
      border-left: 0;
      border-top: 0;
      border-bottom-right-radius: 8px;
    }

    @media (max-width: 480px) {
      .frame {
        width: min(92vw, 380px);
        padding: 14px;
        border-radius: 28px;
      }

      .qr-link {
        width: min(100%, 280px);
      }

      .orb.one, .orb.two, .orb.three {
        opacity: .45;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow"></div>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="frame" aria-label="QR code section">
    <div class="inner">
      <div class="scanline"></div>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <a class="qr-link" href="javascript:void(0)" aria-label="QR code">
        <img src="https://storage3.me-qr.com/qr/323563719.png?v=1774038209" alt="QR Code">
      </a>
    </div>
  </main>
</body>
</html>
