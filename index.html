<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        img {
            width: 220px;
            height: 220px;
            border-radius: 12px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 20px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Сканируй QR</h1>

        <a href='https://me-qr.com' style='cursor:pointer;display:block'>
            <img src='https://storage3.me-qr.com/qr/323563719.png?v=1774038209' alt='QR Code'>
        </a>

        <a href='https://me-qr.com' style='display:none'>Create qr code for free</a>
    </div>

</body>
</html>
