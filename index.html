<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05060a" />
  <title>QR</title>
  <style>
    :root {
      --bg0: #04050a;
      --bg1: #070912;
      --bg2: #0b1020;
      --text: rgba(255,255,255,.96);
      --muted: rgba(255,255,255,.62);
      --muted2: rgba(255,255,255,.42);
      --line: rgba(255,255,255,.13);
      --glass: rgba(255,255,255,.07);
      --glass2: rgba(255,255,255,.11);
      --a: #7c3aed;
      --b: #22d3ee;
      --c: #fb7185;
      --shadow: 0 28px 100px rgba(0,0,0,.66);
      --radius: 34px;
      --inner: 28px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(124,58,237,.18), transparent 24%),
        radial-gradient(circle at 82% 14%, rgba(34,211,238,.16), transparent 22%),
        radial-gradient(circle at 50% 86%, rgba(251,113,133,.11), transparent 28%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 42%, var(--bg2));
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      position: relative;
      isolation: isolate;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, #000 0%, #000 40%, transparent 100%);
      opacity: .3;
      z-index: -4;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: .06;
      mix-blend-mode: soft-light;
      background-image:
        linear-gradient(transparent 0 49%, rgba(255,255,255,.22) 50%, transparent 51%),
        linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,.16) 50%, transparent 51%);
      background-size: 4px 4px, 5px 5px;
      transform: translateZ(0);
    }

    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -3;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(22px);
      opacity: .85;
      animation: drift 12s ease-in-out infinite;
      transform: translate3d(0,0,0);
    }

    .blob.b1 {
      width: 220px; height: 220px; left: -40px; top: 8%;
      background: radial-gradient(circle at 30% 30%, rgba(124,58,237,.34), rgba(124,58,237,.06) 60%, transparent 70%);
      box-shadow: 0 0 100px rgba(124,58,237,.16);
    }
    .blob.b2 {
      width: 280px; height: 280px; right: -70px; top: 10%;
      background: radial-gradient(circle at 30% 30%, rgba(34,211,238,.26), rgba(34,211,238,.05) 60%, transparent 72%);
      box-shadow: 0 0 120px rgba(34,211,238,.12);
      animation-delay: -3s;
    }
    .blob.b3 {
      width: 340px; height: 340px; left: 52%; bottom: -110px;
      background: radial-gradient(circle at 30% 30%, rgba(251,113,133,.20), rgba(251,113,133,.05) 60%, transparent 74%);
      box-shadow: 0 0 120px rgba(251,113,133,.10);
      animation-delay: -6s;
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(0,-18px,0) scale(1.05); }
    }

    .cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 520px;
      height: 520px;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,211,238,.14), rgba(124,58,237,.08) 34%, transparent 72%);
      filter: blur(20px);
      pointer-events: none;
      z-index: -2;
      opacity: .8;
      transition: opacity .2s ease;
    }

    .stage {
      position: relative;
      width: min(92vw, 500px);
      min-height: min(92vw, 500px);
      padding: 22px;
      border-radius: calc(var(--radius) + 14px);
      background:
        linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.04)),
        rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.13);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter: blur(26px) saturate(170%);
      -webkit-backdrop-filter: blur(26px) saturate(170%);
      overflow: hidden;
      transform: translateZ(0);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, rgba(124,58,237,.8), rgba(34,211,238,.6), rgba(251,113,133,.46));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: .45;
      pointer-events: none;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.22), transparent 16%),
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.10), transparent 14%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.08), transparent 16%);
      opacity: .7;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: calc(var(--inner) + 4px);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.08), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 34px 18px 28px;
    }

    .title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 0 12px 40px rgba(0,0,0,.24);
      margin-bottom: 2px;
      position: relative;
      z-index: 2;
    }

    .title .p {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,211,238,.95));
      box-shadow: 0 0 16px rgba(124,58,237,.34);
      flex: 0 0 auto;
    }

    .ring-wrap {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: min(92%, 380px);
      height: min(92%, 380px);
      pointer-events: none;
      opacity: .95;
    }

    .ring {
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.05);
      pointer-events: none;
    }
    .ring.r1 { width: 70%; height: 70%; }
    .ring.r2 { width: 86%; height: 86%; opacity: .55; }
    .ring.r3 { width: 102%; height: 102%; opacity: .30; }

    .qr-shell {
      position: relative;
      z-index: 1;
      width: min(100%, 330px);
      aspect-ratio: 1 / 1;
      padding: 14px;
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.04)),
        rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        0 18px 52px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.16);
      transform-style: preserve-3d;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .qr-shell:hover {
      transform: perspective(900px) rotateX(4deg) rotateY(-4deg) translateY(-2px);
      box-shadow:
        0 22px 60px rgba(0,0,0,.42),
        0 0 0 1px rgba(255,255,255,.10),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .qr-shell a {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      cursor: default;
    }

    .qr-shell img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #fff;
      border-radius: 20px;
      transform: translateZ(0);
      user-select: none;
      -webkit-user-drag: none;
    }

    .foot {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.24);
      border: 1px solid rgba(255,255,255,.10);
      color: var(--muted2);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      position: relative;
      z-index: 2;
      margin-top: 2px;
    }

    .foot .p {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb7185, #22d3ee);
      box-shadow: 0 0 18px rgba(34,211,238,.6);
    }

    .frame-accents {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .frame-accents span {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.18);
    }
    .frame-accents .tl { top: 14px; left: 14px; border-right: 0; border-bottom: 0; border-top-left-radius: 8px; }
    .frame-accents .tr { top: 14px; right: 14px; border-left: 0; border-bottom: 0; border-top-right-radius: 8px; }
    .frame-accents .bl { bottom: 14px; left: 14px; border-right: 0; border-top: 0; border-bottom-left-radius: 8px; }
    .frame-accents .br { bottom: 14px; right: 14px; border-left: 0; border-top: 0; border-bottom-right-radius: 8px; }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .stage {
        width: min(94vw, 420px);
        min-height: min(94vw, 420px);
        padding: 14px;
        border-radius: 32px;
      }
      .inner {
        gap: 18px;
        padding: 26px 12px 22px;
      }
      .qr-shell {
        width: min(100%, 286px);
        padding: 12px;
      }
      .title, .foot {
        font-size: 11px;
        padding: 9px 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="blobs" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="cursor" id="cursor"></div>

  <main class="stage" aria-label="QR code card">
    <div class="inner" id="card">
      <div class="ring-wrap" aria-hidden="true">
        <div class="ring r3"></div>
        <div class="ring r2"></div>
        <div class="ring r1"></div>
      </div>


      <div class="frame-accents" aria-hidden="true">
        <span class="tl"></span>
        <span class="tr"></span>
        <span class="bl"></span>
        <span class="br"></span>
      </div>

      <div class="title"><span class="p"></span> scan this rn</div>

      <div class="qr-shell" id="tilt">
        <a href="javascript:void(0)" aria-label="qr">
          <img src="https://storage3.me-qr.com/qr/323563719.png?v=1774038209" alt="QR Code">
        </a>
      </div>
  </main>

  <script>
    const cursor = document.getElementById('cursor');
    const tilt = document.getElementById('tilt');
    let raf = null;

    window.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      if (!tilt) return;
      if (raf) cancelAnimationFrame(raf);

      raf = requestAnimationFrame(() => {
        const rect = tilt.getBoundingClientRect();
        const inside = (
          e.clientX >= rect.left && e.clientX <= rect.right &&
          e.clientY >= rect.top && e.clientY <= rect.bottom
        );

        if (!inside) {
          tilt.style.transform = '';
          return;
        }

        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        tilt.style.transform = `perspective(900px) rotateX(${(-y * 8).toFixed(2)}deg) rotateY(${(x * 8).toFixed(2)}deg) translateY(-2px)`;
      });
    });

    window.addEventListener('mouseleave', () => {
      cursor.style.opacity = '0';
    });

    window.addEventListener('mouseenter', () => {
      cursor.style.opacity = '.8';
    });
  </script>
</body>
</html>
