<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>QR</title>
  <style>
    :root {
      --bg: #050505;
      --bg2: #090909;
      --text: #f5f5f7;
      --muted: rgba(245,245,247,.68);
      --line: rgba(255,255,255,.12);
      --card: rgba(255,255,255,.06);
      --shadow: 0 20px 80px rgba(0,0,0,.55);
      --accent: #7c3aed;
      --accent2: #22d3ee;
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(124,58,237,.18), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34,211,238,.16), transparent 24%),
        radial-gradient(circle at 50% 90%, rgba(251,113,133,.12), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, black 0%, black 45%, transparent 100%);
      opacity: .35;
      z-index: -2;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .06;
      z-index: 999;
      mix-blend-mode: soft-light;
      background-image:
        linear-gradient(transparent 0 49%, rgba(255,255,255,.28) 50%, transparent 51%),
        linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,.18) 50%, transparent 51%);
      background-size: 4px 4px, 5px 5px;
    }

    .cursor-glow {
      position: fixed;
      left: 0;
      top: 0;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,211,238,.14), rgba(124,58,237,.08) 35%, transparent 72%);
      filter: blur(18px);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 0;
      transition: opacity .25s ease;
      opacity: .75;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      padding: 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.15), transparent 20%),
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.1), transparent 14%);
      opacity: .75;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 14px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb7185, #22d3ee);
      box-shadow: 0 0 20px rgba(34,211,238,.55);
      flex: 0 0 auto;
    }

    .qr-wrap {
      position: relative;
      padding: 14px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.04)),
        rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        0 18px 50px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.18);
      overflow: hidden;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .qr-wrap::before,
    .qr-wrap::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      filter: blur(36px);
      pointer-events: none;
      opacity: .45;
    }

    .qr-wrap::before {
      background: rgba(124,58,237,.35);
      top: -70px;
      left: -60px;
    }

    .qr-wrap::after {
      background: rgba(34,211,238,.22);
      bottom: -70px;
      right: -50px;
    }

    .scanline {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 14px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(34,211,238,.95), rgba(124,58,237,.95), transparent);
      box-shadow: 0 0 18px rgba(34,211,238,.45);
      animation: scan 2.8s ease-in-out infinite;
      z-index: 2;
      opacity: .9;
    }

    @keyframes scan {
      0%   { transform: translateY(0); opacity: .18; }
      15%  { opacity: .9; }
      50%  { transform: translateY(calc(100% + 220px)); opacity: .85; }
      85%  { opacity: .9; }
      100% { transform: translateY(0); opacity: .18; }
    }

    img {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      background: #fff;
    }

    .qr-link {
      display: block;
      width: min(100%, 320px);
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 180ms ease;
    }

    .qr-link:hover {
      transform: scale(1.01);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 480px) {
      .card {
        width: min(94vw, 420px);
        padding: 16px;
      }

      .qr-wrap {
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <main class="card">
    <div class="top">
      <h1 class="title">QR</h1>
      <div class="dot"></div>
    </div>

    <div class="qr-wrap">
      <div class="scanline"></div>

      <a class="qr-link" href="javascript:void(0)" aria-label="QR code">
        <img src="https://storage3.me-qr.com/qr/323563719.png?v=1774038209" alt="QR Code">
      </a>
    </div>
  </main>

  <script>
    const glow = document.getElementById('cursorGlow');

    window.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    window.addEventListener('mouseleave', () => {
      glow.style.opacity = '0';
    });

    window.addEventListener('mouseenter', () => {
      glow.style.opacity = '.75';
    });
  </script>
</body>
</html>
